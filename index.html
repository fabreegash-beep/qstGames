    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(freq = 660, duration = 0.2, type = 'sine') {
            try {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = freq;
                osc.type = type;
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
                osc.start();
                osc.stop(now + duration);
            } catch(e) { }
        }
        function playWin() { playBeep(880, 0.4, 'sine'); setTimeout(() => playBeep(1320, 0.5, 'sine'), 200); }
        function playLose() { playBeep(440, 0.6, 'sawtooth'); }
        function playClick() { playBeep(660, 0.08, 'sine'); }
    </script>

    let currentRoomId = null, currentPlayer = null, roomListener = null;

    function createRoom() {
        // إنشاء غرفة بأرقام فقط (6 أرقام)
        const roomId = Math.floor(100000 + Math.random() * 900000).toString();
        currentRoomId = roomId; currentPlayer = 'host';
        database.ref('rooms/' + roomId).set({
            host: { joined: true, secretItem: null },
            guest: { joined: false, secretItem: null },
            phase: 'waiting', turn: 'host', messages: []
        }).then(() => listenToRoom(roomId));
    }

    function joinRoom() {
        const roomId = prompt("أدخل رقم الغرفة:");
        if (!roomId) return;
        database.ref('rooms/' + roomId).once('value', snap => {
            if (!snap.exists()) return alert("الغرفة غير موجودة");
            currentRoomId = roomId; currentPlayer = 'guest';
            database.ref('rooms/' + roomId).update({ 'guest/joined': true, phase: 'topic_selection' });
            listenToRoom(roomId);
        });
    }

    function listenToRoom(roomId) {
        if (roomListener) roomListener.off();
        roomListener = database.ref('rooms/' + roomId);
        roomListener.on('value', snap => {
            const room = snap.val();
            if (room) renderGame(room);
        });
    }

    function selectTopic(topicKey) {
        const hItem = TOPICS[topicKey].items[Math.floor(Math.random() * TOPICS[topicKey].items.length)];
        const gItem = TOPICS[topicKey].items[Math.floor(Math.random() * TOPICS[topicKey].items.length)];
        database.ref('rooms/' + currentRoomId).update({
            topic: topicKey, phase: 'playing',
            'host/secretItem': hItem, 'guest/secretItem': gItem,
            messages: [{ from: 'system', text: `🎯 الموضوع: ${TOPICS[topicKey].name}` }]
        });
    }

    function sendQuestion() {
        const q = document.getElementById('questionInput').value;
        if (!q) return;
        database.ref('rooms/' + currentRoomId).once('value', snap => {
            const room = snap.val();
            database.ref('rooms/' + currentRoomId).update({
                messages: [...(room.messages || []), { from: currentPlayer, text: `❓ ${q}` }],
                waitingForAnswer: true, currentQuestion: q,
                turn: currentPlayer === 'host' ? 'guest' : 'host'
            });
        });
    }

    function sendAnswerWithNote(answer) {
        const note = document.getElementById('answerNote').value.trim();
        const baseAnswer = answer === 'yes' ? '✅ نعم' : '❌ لا';
        const finalMsg = note ? `${baseAnswer} (${note})` : baseAnswer;

        database.ref('rooms/' + currentRoomId).once('value', snap => {
            const room = snap.val();
            database.ref('rooms/' + currentRoomId).update({
                messages: [...(room.messages || []), { from: currentPlayer, text: finalMsg }],
                waitingForAnswer: false, currentQuestion: null, turn: currentPlayer
            });
        });
    }

    // تعديل وظيفة التخمين لتصبح مرئية وتنقل الدور
    function makeGuess() {
        const g = document.getElementById('guessInput').value.trim();
        if(!g) return;

        database.ref('rooms/' + currentRoomId).once('value', snap => {
            const room = snap.val();
            const opponentSecret = currentPlayer === 'host' ? room.guest.secretItem : room.host.secretItem;
            
            // إضافة التخمين كرسالة في الدردشة ليراها الخصم
            const guessMsg = { from: currentPlayer, text: `🤔 تخمين: ${g}` };
            const newMessages = [...(room.messages || []), guessMsg];

            if (g === opponentSecret) {
                playWin();
                database.ref('rooms/' + currentRoomId).update({ 
                    messages: newMessages,
                    phase: 'finished', 
                    winner: currentPlayer 
                });
            } else {
                playLose();
                alert("تخمين خاطئ! سينتقل الدور للخصم.");
                // تحديث الرسائل ونقل الدور للخصم
                database.ref('rooms/' + currentRoomId).update({
                    messages: newMessages,
                    turn: currentPlayer === 'host' ? 'guest' : 'host'
                });
            }
        });
    }

    function renderGame(room) {
        const isHost = currentPlayer === 'host';
        const myTurn = (isHost && room.turn === 'host') || (!isHost && room.turn === 'guest');
        let html = `<div class="room-section">رقم الغرفة: <span class="room-code">${currentRoomId}</span></div>`;

        if (room.phase === 'waiting') {
            html += `<div class="system-message">⏳ في انتظار الخصم...</div>`;
        } else if (room.phase === 'topic_selection') {
            if (isHost) {
                html += `<div class="topic-selector"><h3>اختر موضوع اللعبة:</h3>`;
                Object.keys(TOPICS).forEach(k => html += `<button class="btn-orange" onclick="selectTopic('${k}')">${TOPICS[k].name}</button>`);
                html += `</div>`;
            } else {
                html += `<div class="system-message">⏳ المضيف يختار الموضوع...</div>`;
            }
        } else if (room.phase === 'playing') {
            const mySecret = isHost ? room.host.secretItem : room.guest.secretItem;
            html += `
                <div class="players">
                    <div class="player-card ${room.turn === 'host' ? 'active' : ''}">المضيف ${isHost ? `<div class="secret-item">${mySecret}</div>` : ''}</div>
                    <div class="player-card ${room.turn === 'guest' ? 'active' : ''}">الضيف ${!isHost ? `<div class="secret-item">${mySecret}</div>` : ''}</div>
                </div>
                <div class="chat-area" id="chatWindow">
                    ${(room.messages || []).map(m => `<div class="message ${m.from === currentPlayer ? 'my-message' : (m.from === 'system' ? 'system-message' : 'opponent-message')}">${m.text}</div>`).join('')}
                </div>
            `;

            if (myTurn && room.waitingForAnswer) {
                html += `
                    <div class="system-message">السؤال: ${room.currentQuestion}</div>
                    <input type="text" id="answerNote" class="note-input" placeholder="اكتب ملاحظة (اختياري)...">
                    <div style="display:flex; gap:10px;">
                        <button class="btn-yes" style="flex:1" onclick="sendAnswerWithNote('yes')">نعم</button>
                        <button class="btn-no" style="flex:1" onclick="sendAnswerWithNote('no')">لا</button>
                    </div>`;
            } else if (myTurn) {
                html += `
                    <input type="text" id="questionInput" placeholder="اكتب سؤالك للخصم...">
                    <button class="btn-cyan" onclick="sendQuestion()" style="width:100%">إرسال السؤال</button>
                    <hr style="margin:15px 0; opacity:0.2">
                    <input type="text" id="guessInput" placeholder="خمن ماهو عنصر الخصم؟">
                    <button class="btn-orange" onclick="makeGuess()" style="width:100%">🎯 تخمين نهائي ونقل الدور</button>
                `;
            } else {
                html += `<div class="system-message">⏳ انتظر دور الخصم...</div>`;
            }
        } else if (room.phase === 'finished') {
            html += `<div class="punishment-modal"><div class="punishment-content"><h2>🎉 مبروك الفوز! 🎉</h2><p>الفائز هو: ${room.winner === 'host' ? 'المضيف' : 'الضيف'}</p><button class="btn-green" onclick="location.reload()">لعبة جديدة</button></div></div>`;
        }

        document.getElementById('mainContent').innerHTML = html;
        const chat = document.getElementById('chatWindow');
        if (chat) chat.scrollTop = chat.scrollHeight;
    }
</script>
</body>
</html>
