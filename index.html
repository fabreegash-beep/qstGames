    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(freq = 660, duration = 0.2, type = 'sine') {
            try {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = freq;
                osc.type = type;
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
                osc.start();
                osc.stop(now + duration);
            } catch(e) { }
        }
        function playWin() { playBeep(880, 0.4, 'sine'); setTimeout(() => playBeep(1320, 0.5, 'sine'), 200); }
        function playLose() { playBeep(440, 0.6, 'sawtooth'); }
        function playClick() { playBeep(660, 0.08, 'sine'); }
    </script>

        const roomId = prompt("أدخل رقم الغرفة:");
        if (!roomId) return;
        database.ref('rooms/' + roomId).once('value', snap => {
            if (!snap.exists()) return alert("الغرفة غير موجودة");
            currentRoomId = roomId; currentPlayer = 'guest';
            database.ref('rooms/' + roomId).update({ 'guest/joined': true, phase: 'topic_selection' });
            listenToRoom(roomId);
        });
    }

    function listenToRoom(roomId) {
        if (roomListener) roomListener.off();
        roomListener = database.ref('rooms/' + roomId);
        roomListener.on('value', snap => {
            const room = snap.val();
            if (room) renderGame(room);
        });
    }

    function selectTopic(topicKey) {
        const hItem = TOPICS[topicKey].items[Math.floor(Math.random() * TOPICS[topicKey].items.length)];
        const gItem = TOPICS[topicKey].items[Math.floor(Math.random() * TOPICS[topicKey].items.length)];
        database.ref('rooms/' + currentRoomId).update({
            topic: topicKey, phase: 'playing',
            'host/secretItem': hItem, 'guest/secretItem': gItem,
            messages: [{ from: 'system', text: `🎯 الموضوع: ${TOPICS[topicKey].name}` }],
            waitingForAnswer: false,
            currentQuestion: null,
            turn: 'host'  // host يبدأ أولاً
        });
    }

    // إرسال سؤال نصي مع إنهاء الدور
    function sendQuestion() {
        const q = document.getElementById('questionInput').value;
        if (!q) return;
        
        database.ref('rooms/' + currentRoomId).once('value', snap => {
            const room = snap.val();
            const newMessages = [...(room.messages || []), { from: currentPlayer, text: `❓ ${q}` }];
            // بعد إرسال السؤال، ننتقل إلى مرحلة انتظار الإجابة، ويصبح دور الخصم للإجابة
            database.ref('rooms/' + currentRoomId).update({
                messages: newMessages,
                waitingForAnswer: true,
                currentQuestion: q,
                turn: currentPlayer === 'host' ? 'guest' : 'host'  // نقل الدور إلى الخصم ليُجيب
            });
        });
        document.getElementById('questionInput').value = '';
        playClick();
    }

    // --- Voice Recording: بعد انتهاء التسجيل، تُرسل كرسالة صوتية وتُنقل الدور تلقائياً مثل السؤال الكتابي ---
    async function startVoiceRecording() {
        if (isRecording) return;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(audioBlob);
                reader.onloadend = () => {
                    const base64Audio = reader.result;
                    // إرسال الرسالة الصوتية وإنهاء الدور تماماً مثل السؤال النصي
                    database.ref('rooms/' + currentRoomId).once('value', snap => {
                        const room = snap.val();
                        if (!room) return;
                        // إنشاء رسالة صوتية مع نوع voice
                        const voiceMsg = { 
                            from: currentPlayer, 
                            type: 'voice', 
                            audioData: base64Audio,
                            timestamp: Date.now()
                        };
                        const newMessages = [...(room.messages || []), voiceMsg];
                        // تحويل الحالة: نضع waitingForAnswer=true ونخزن سؤال افتراضي (رسالة صوتية) وننقل الدور للخصم للإجابة
                        database.ref('rooms/' + currentRoomId).update({
                            messages: newMessages,
                            waitingForAnswer: true,
                            currentQuestion: "📢 [رسالة صوتية] الرجاء الاستماع ثم الإجابة بنعم/لا",
                            turn: currentPlayer === 'host' ? 'guest' : 'host'
                        }).then(() => {
                            // تنظيف مؤشر التسجيل
                            const btn = document.getElementById('voiceRecBtn');
                            if (btn) btn.innerText = '🎙️ سؤال صوتي';
                        });
                    });
                };
                stream.getTracks().forEach(track => track.stop());
                isRecording = false;
                playClick();
            };
            mediaRecorder.start();
            isRecording = true;
            const btn = document.getElementById('voiceRecBtn');
            if (btn) btn.innerText = '⏺️ جاري التسجيل ... اضغط للإيقاف والإرسال';
        } catch(err) {
            alert("لابد من السماح بالميكروفون لإرسال رسائل صوتية");
            console.error(err);
        }
    }

    function stopVoiceRecordingAndSend() {
        if (mediaRecorder && isRecording && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
        }
    }

    function toggleVoiceRecording() {
        if (!isRecording) {
            startVoiceRecording();
        } else {
            stopVoiceRecordingAndSend();
        }
    }

    // دالة تشغيل الصوت للخصم (تظهر في واجهة الخصم)
    function playAudioMessage(base64Data) {
        try {
            const audio = new Audio(base64Data);
            audio.play().catch(e => {
                console.log("Auto-play prevented, user must interact");
                alert("لتشغيل الصوت اضغط على الزر مرة أخرى (سياسة المتصفح)");
            });
            playClick();
        } catch(e) { console.error(e); }
    }

    // إجابة الخصم بنعم/لا بعد سماع السؤال (نصي أو صوتي)
    function sendAnswerWithNote(answer) {
        const note = document.getElementById('answerNote').value.trim();
        const baseAnswer = answer === 'yes' ? '✅ نعم' : '❌ لا';
        const finalMsg = note ? `${baseAnswer} (${note})` : baseAnswer;

        database.ref('rooms/' + currentRoomId).once('value', snap => {
            const room = snap.val();
            const newMessages = [...(room.messages || []), { from: currentPlayer, text: finalMsg }];
            // بعد الإجابة، نزيل حالة انتظار الإجابة، ونعيد الدور إلى نفس اللاعب (الذي سأل) ليتمكن من طرح سؤال جديد أو تخمين
            // لكن حسب المنطق: من أجاب يصبح دوره هو طرح السؤال التالي؟ في اللعبة الأصلية: بعد الإجابة يعود الدور للسائل.
            // ولكن الأفضل أن من أجاب يُنهي دوره ويعود الدور لمن سأل. لكن في تصميمك الأصلي: turn = currentPlayer بعد الإجابة.
            // سأحافظ على المنطق: بعد الإجابة، يصبح الدور لمن أرسل السؤال (أي الخصم السابق). لكن الأسهل: نعطي الدور لمن قام بالإجابة (لأنه الآن دوره يسأل أو يخمن).
            // حسب منطق ألعاب التخمين: بعد الإجابة، السائل يستمر في الأسئلة. لكن هنا لتبسيط: بعد الإجابة، يصبح الدور للشخص الذي أجاب (ليتمكن من طرح سؤال جديد).
            // لكن تطبيقنا: turn كان قد انتقل إلى الخصم للإجابة. بعد الإجابة يجب أن يعود الدور إلى السائل الأصلي؟ لا، الأفضل أن الخصم بعد إجابته يصبح دوره هو طرح سؤال أو تخمين. 
            // سأجعل turn = currentPlayer (الذي أجاب) حتى يتمكن من طرح سؤال جديد. هذا متوافق مع اللعبة التفاعلية.
            database.ref('rooms/' + currentRoomId).update({
                messages: newMessages,
                waitingForAnswer: false,
                currentQuestion: null,
                turn: currentPlayer   // من أجاب يصبح دوره الآن (يطرح سؤالاً أو يخمن)
            });
        });
        document.getElementById('answerNote').value = '';
    }

    function makeGuess() {
        const g = document.getElementById('guessInput').value.trim();
        if(!g) return;

        database.ref('rooms/' + currentRoomId).once('value', snap => {
            const room = snap.val();
            const opponentSecret = currentPlayer === 'host' ? room.guest.secretItem : room.host.secretItem;
            const guessMsg = { from: currentPlayer, text: `🤔 تخمين: ${g}` };
            const newMessages = [...(room.messages || []), guessMsg];

            if (g === opponentSecret) {
                playWin();
                database.ref('rooms/' + currentRoomId).update({ 
                    messages: newMessages,
                    phase: 'finished', 
                    winner: currentPlayer,
                    waitingForAnswer: false
                });
            } else {
                playLose();
                alert("تخمين خاطئ! سينتقل الدور للخصم.");
                // نقل الدور إلى الخصم بعد تخمين خاطئ
                database.ref('rooms/' + currentRoomId).update({
                    messages: newMessages,
                    turn: currentPlayer === 'host' ? 'guest' : 'host',
                    waitingForAnswer: false
                });
            }
        });
        document.getElementById('guessInput').value = '';
    }

    function renderGame(room) {
        const isHost = currentPlayer === 'host';
        const myTurn = (isHost && room.turn === 'host') || (!isHost && room.turn === 'guest');
        const mustAnswer = (room.waitingForAnswer === true);
        const isAnsweringTurn = (myTurn && mustAnswer);
        const isAskingTurn = (myTurn && !mustAnswer);
        
        let html = `<div class="room-section">رقم الغرفة: <span class="room-code">${currentRoomId}</span></div>`;

        if (room.phase === 'waiting') {
            html += `<div class="system-message">⏳ في انتظار الخصم...</div>`;
        } else if (room.phase === 'topic_selection') {
            if (isHost) {
                html += `<div class="topic-selector"><h3>اختر موضوع اللعبة:</h3>`;
                Object.keys(TOPICS).forEach(k => html += `<button class="btn-orange" onclick="selectTopic('${k}')">${TOPICS[k].name}</button>`);
                html += `</div>`;
            } else {
                html += `<div class="system-message">⏳ المضيف يختار الموضوع...</div>`;
            }
        } else if (room.phase === 'playing') {
            const mySecret = isHost ? room.host.secretItem : room.guest.secretItem;
            html += `
                <div class="players">
                    <div class="player-card ${room.turn === 'host' ? 'active' : ''}">المضيف ${isHost ? `<div class="secret-item">🔐 ${mySecret}</div>` : ''}</div>
                    <div class="player-card ${room.turn === 'guest' ? 'active' : ''}">الضيف ${!isHost ? `<div class="secret-item">🔐 ${mySecret}</div>` : ''}</div>
                </div>
                <div class="chat-area" id="chatWindow">
                    ${(room.messages || []).map(m => {
                        if (m.type === 'voice') {
                            const isMyMsg = m.from === currentPlayer;
                            // تجهيز معرف فريد للتشغيل
                            const audioDataForPlay = m.audioData.replace(/'/g, "\\'");
                            return `<div class="message ${isMyMsg ? 'my-message' : 'opponent-message'}">
                                        <div class="audio-msg" onclick="playAudioMessage('${m.audioData}')">
                                            🎙️ رسالة صوتية <span style="font-size:12px;">▶️ اضغط للاستماع</span>
                                        </div>
                                        <div style="font-size:11px; opacity:0.7; margin-right:10px;">من: ${m.from === 'host' ? 'المضيف' : 'الضيف'}</div>
                                    </div>`;
                        } else {
                            const cls = m.from === currentPlayer ? 'my-message' : (m.from === 'system' ? 'system-message' : 'opponent-message');
                            return `<div class="message ${cls}">${m.text}</div>`;
                        }
                    }).join('')}
                </div>
            `;

            // حالة: يجب على اللاعب الإجابة (لأن هناك سؤالاً منتظراً)
            if (isAnsweringTurn) {
                html += `
                    <div class="system-message">📢 سؤال الخصم: ${room.currentQuestion || "يرجى الاستماع للرسالة الصوتية أعلاه ثم الإجابة"}</div>
                    <input type="text" id="answerNote" class="note-input" placeholder="اكتب ملاحظة (اختياري)...">
                    <div style="display:flex; gap:10px;">
                        <button class="btn-yes" style="flex:1" onclick="sendAnswerWithNote('yes')">نعم ✅</button>
                        <button class="btn-no" style="flex:1" onclick="sendAnswerWithNote('no')">لا ❌</button>
                    </div>`;
            }
            // حالة: دور اللاعب لطرح سؤال أو تخمين (لا يوجد سؤال معلق)
            else if (isAskingTurn) {
                html += `
                    <div class="voice-controls">
                        <button id="voiceRecBtn" class="btn-mic" style="flex:1" onclick="toggleVoiceRecording()">🎙️ سؤال صوتي (اضغط هنا) </button>
                        <span style="font-size:12px;">اضغط للتسجيل، ثم اضغط مرة أخرى للإرسال التلقائي</span>
                    </div>
                    <textarea id="questionInput" rows="2" placeholder="اكتب سؤالك للخصم... (بعد الإرسال ينتهي دورك)"></textarea>
                    <button class="btn-cyan" onclick="sendQuestion()" style="width:100%">📨 إرسال السؤال (نصي) + إنهاء دوري</button>
                    <hr style="margin:15px 0; opacity:0.2">
                    <input type="text" id="guessInput" placeholder="🔍 خمن ماهو عنصر الخصم (تخمين خاطئ ينهي دورك)؟">
                    <button class="btn-orange" onclick="makeGuess()" style="width:100%">🎯 تخمين نهائي</button>
                `;
            } 
            else {
                html += `<div class="system-message">⏳ ليس دورك. انتظر الخصم يرسل سؤالاً (نصياً أو صوتياً) أو يخمن...</div>`;
            }
        } else if (room.phase === 'finished') {
            html += `<div class="punishment-modal"><div class="punishment-content"><h2>🎉 مبروك الفوز! 🎉</h2><p>الفائز هو: ${room.winner === 'host' ? 'المضيف' : 'الضيف'}</p><button class="btn-green" onclick="location.reload()">لعبة جديدة</button></div></div>`;
        }

        document.getElementById('mainContent').innerHTML = html;
        const chat = document.getElementById('chatWindow');
        if (chat) chat.scrollTop = chat.scrollHeight;
    }

    // Global functions for onclick
    window.createRoom = createRoom;
    window.joinRoom = joinRoom;
    window.selectTopic = selectTopic;
    window.sendQuestion = sendQuestion;
    window.sendAnswerWithNote = sendAnswerWithNote;
    window.makeGuess = makeGuess;
    window.toggleVoiceRecording = toggleVoiceRecording;
    window.startVoiceRecording = startVoiceRecording;
    window.stopVoiceRecordingAndSend = stopVoiceRecordingAndSend;
    window.playAudioMessage = playAudioMessage;
</script>
</body>
</html>
