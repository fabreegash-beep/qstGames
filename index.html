    <!-- Audio Effects -->
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(freq = 660, duration = 0.2, type = 'sine') {
            try {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = freq;
                osc.type = type;
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
                osc.start();
                osc.stop(now + duration);
            } catch(e) { }
        }
        function playWin() { playBeep(880, 0.4, 'sine'); setTimeout(() => playBeep(1320, 0.5, 'sine'), 200); }
        function playLose() { playBeep(440, 0.6, 'sawtooth'); }
        function playClick() { playBeep(660, 0.08, 'sine'); }
        function playTurn() { playBeep(523.25, 0.15, 'triangle'); }
        function playMessage() { playBeep(880, 0.05, 'sine'); }
    </script>

            border-radius: 10px;
        }
    </style>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBjHyON3NjKz2yBxCqwgLftd2trh03HYQc",
        authDomain: "arabic-game-onlin.firebaseapp.com",
        databaseURL: "https://arabic-game-onlin-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "arabic-game-onlin",
        storageBucket: "arabic-game-onlin.firebasestorage.app",
        messagingSenderId: "406939044821",
        appId: "1:406939044821:web:3fe9a371862a4ca23f8b5c"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    // قائمة الأحكام
    const PUNISHMENTS = [
        "🎭 أعط صاحبك لقبًا مضحكًا لمدة دقيقة", "🎬 قلد شخصية كرتونية", "📸 أرسل صورة وجه مضحك للمجموعة",
        "🤫 أخبر الجميع بسر صغير", "📝 اكتب كلمة صعبة بالعكس", "🎙️ اقرأ جملة مضحكة بصوت مسموع",
        "😂 احكي أغرب موقف صار لك", "🍕 صف أكلة بدون ما تقول اسمها", "🏷️ اخترع لقب غريب لنفسك",
        "🎤 غنِّ مقطع من أغنية بطريقة غريبة", "🔄 لف حول نفسك 3 مرات", "🎭 قلد حيوانًا بصوت",
        "😝 قلد أحد اللاعبين", "⭐ قلد شخصية مشهورة", "🦩 قف على رجل واحدة 10 ثواني",
        "🥤 قل أسوأ مشروب جربته", "🚗 قلد صوت سيارة", "📖 احكي موقف محرج", "🎬 مثل مشهد من فيلم"
    ];
    
    function getRandomPunishment() { return PUNISHMENTS[Math.floor(Math.random() * PUNISHMENTS.length)]; }
    
    function showPunishment(punishment, isWinner) {
        playWin();
        const modal = document.createElement('div');
        modal.className = 'punishment-modal';
        modal.innerHTML = `
            <div class="punishment-content">
                <div style="font-size:3rem;">${isWinner ? '🏆🎲' : '😭⚠️'}</div>
                <h3>${isWinner ? '🎲 اختر حكمًا للخاسر 🎲' : '⚠️ الحكم المطلوب تنفيذه ⚠️'}</h3>
                <div class="punishment-text">${punishment}</div>
                <button onclick="this.closest('.punishment-modal').remove(); playClick()" class="btn-green">${isWinner ? '📋 نسخ الحكم' : '✅ تم التنفيذ'}</button>
                ${isWinner ? `<button onclick="changePunishmentModal(this)" class="btn-orange">🎲 حكم آخر</button>` : ''}
            </div>
        `;
        document.body.appendChild(modal);
    }
    
    window.changePunishmentModal = (btn) => {
        const modal = btn.closest('.punishment-modal');
        modal.querySelector('.punishment-text').innerHTML = getRandomPunishment();
        playClick();
    };
    
    // المواضيع (15 موضوع)
    const TOPICS = {
        مشاهير_عرب: { name: "⭐ مشاهير عرب", items: ["محمد صلاح", "أم كلثوم", "عبد الحليم حافظ", "عادل إمام", "تامر حسني", "نانسي عجرم", "أحمد حلمي", "عمرو دياب"] },
        مشاهير_عالم: { name: "🌟 مشاهير عالم", items: ["ليونيل ميسي", "كريستيانو رونالدو", "توم كروز", "ليوناردو دي كابريو", "أنجلينا جولي", "ذا روك", "ويل سميث", "كيانو ريفز"] },
        حيوانات: { name: "🦁 حيوانات", items: ["أسد", "نمر", "فيل", "زرافة", "قرد", "دلفين", "حوت", "تمساح"] },
        أكلات: { name: "🍕 أكلات", items: ["بيتزا", "برجر", "مكرونة", "كنافة", "شاورما", "كشري", "فلافل", "مندي"] },
        دول: { name: "🌍 دول", items: ["مصر", "السعودية", "الإمارات", "قطر", "الكويت", "الأردن", "لبنان", "المغرب"] },
        أفلام: { name: "🎬 أفلام", items: ["المومياء", "الجزيرة", "الفيل الأزرق", "ولاد رزق", "تيتانيك", "أفاتار", "العراب", "فورست غامب"] },
        رياضات: { name: "⚽ رياضات", items: ["كرة قدم", "كرة سلة", "كرة طائرة", "تنس", "سباحة", "جمباز", "ملاكمة", "جودو"] },
        مهن: { name: "👨‍⚕️ مهن", items: ["طبيب", "مهندس", "معلم", "محامي", "طيار", "شرطي", "طباخ", "نجار"] },
        شخصيات_كرتونية: { name: "🎭 كرتون", items: ["ميكي ماوس", "بندق", "سبونج بوب", "باتريك", "سوبر مان", "بات مان", "سبايدر مان", "توم"] },
        فواكه: { name: "🍎 فواكه", items: ["تفاح", "موز", "برتقال", "فراولة", "عنب", "مانجو", "أناناس", "كيوي"] },
        خضروات: { name: "🥕 خضروات", items: ["طماطم", "خيار", "جزر", "بطاطس", "بصل", "ثوم", "فلفل", "باذنجان"] },
        مشروبات: { name: "🥤 مشروبات", items: ["قهوة", "شاي", "عصير برتقال", "كولا", "ماء", "حليب", "شوكولاتة ساخنة", "نسكافيه"] },
        تكنولوجيا: { name: "💻 تكنولوجيا", items: ["هاتف", "كمبيوتر", "لابتوب", "تابلت", "ساعة ذكية", "سماعات", "كاميرا", "طابعة"] },
        طبيعة: { name: "🏔️ طبيعة", items: ["جبل", "بحر", "نهر", "وادي", "صحراء", "غابة", "شلال", "كهف"] },
        ألوان: { name: "🎨 ألوان", items: ["أحمر", "أزرق", "أخضر", "أصفر", "أسود", "أبيض", "برتقالي", "بنفسجي"] }
    };
    
    let currentRoomId = null;
    let currentPlayer = null;
    let roomListener = null;
    
    function getRandomItemFromTopic(topicKey) {
        const items = TOPICS[topicKey].items;
        return items[Math.floor(Math.random() * items.length)];
    }
    
    function showMessage(msg, isError = false) {
        playClick();
        const div = document.createElement('div');
        div.textContent = msg;
        div.style.cssText = `position: fixed; bottom: 20px; right: 50%; transform: translateX(50%); background: ${isError ? '#e74c3c' : '#27ae60'}; color: white; padding: 12px 24px; border-radius: 60px; z-index: 9999; font-weight: bold; backdrop-filter: blur(8px); text-align: center;`;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2800);
    }
    
    function createRoom() {
        playClick();
        const roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
        currentRoomId = roomId;
        currentPlayer = 'host';
        
        const roomData = {
            host: { joined: true, secretItem: null, hasItem: false },
            guest: { joined: false, secretItem: null, hasItem: false },
            topic: null,
            topicChosen: false,
            turn: 'host',
            phase: 'topic_selection',
            gameEnded: false,
            winner: null,
            messages: [],
            waitingForAnswer: false,
            currentQuestion: null
        };
        
        database.ref('rooms/' + roomId).set(roomData).then(() => { listenToRoom(roomId); showWaitingRoom(); });
    }
    
    function joinRoom() {
        playClick();
        const roomId = prompt("🔑 أدخل رمز الغرفة:", "").toUpperCase();
        if (!roomId) return;
        database.ref('rooms/' + roomId).once('value').then(snapshot => {
            const room = snapshot.val();
            if (!room) { showMessage("❌ الغرفة غير موجودة!", true); return; }
            if (room.guest.joined) { showMessage("❌ الغرفة ممتلئة!", true); return; }
            currentRoomId = roomId;
            currentPlayer = 'guest';
            database.ref('rooms/' + roomId).update({ 'guest/joined': true }).then(() => { listenToRoom(roomId); showMessage("✅ تم الانضمام بنجاح!"); });
        });
    }
    
    function listenToRoom(roomId) {
        if (roomListener) roomListener.off();
        roomListener = database.ref('rooms/' + roomId);
        roomListener.on('value', (snapshot) => {
            const room = snapshot.val();
            if (!room) { showMainMenu(); return; }
            renderGame(room);
        });
    }
    
    function showWaitingRoom() {
        document.getElementById('mainContent').innerHTML = `
            <div class="room-section">
                <div class="room-code">${currentRoomId}</div>
                <button onclick="copyCode();playClick()" class="btn-green">📋 نسخ الرمز</button>
                <div class="spinner"></div>
                <p style="color:white; margin:15px 0;">⏳ في انتظار انضمام صديق...</p>
                <button onclick="backToMenu()" class="btn-red">🚪 إلغاء</button>
            </div>
        `;
    }
    
    function copyCode() { navigator.clipboard.writeText(currentRoomId); showMessage("✅ تم نسخ الرمز: " + currentRoomId); }
    
    function backToMenu() {
        if (roomListener) roomListener.off();
        if (currentRoomId) database.ref('rooms/' + currentRoomId).remove();
        currentRoomId = null;
        currentPlayer = null;
        showMainMenu();
    }
    
    function selectTopic(topicKey) {
        playClick();
        database.ref('rooms/' + currentRoomId).once('value', snap => {
            const room = snap.val();
            if (!room || room.topicChosen) return;
            const hostItem = getRandomItemFromTopic(topicKey);
            const guestItem = getRandomItemFromTopic(topicKey);
            database.ref('rooms/' + currentRoomId).update({
                topic: topicKey,
                topicChosen: true,
                'host/secretItem': hostItem,
                'host/hasItem': true,
                'guest/secretItem': guestItem,
                'guest/hasItem': true,
                phase: 'playing',
                turn: 'host',
                messages: [{ from: 'system', text: `🎯 الموضوع: ${TOPICS[topicKey].name} 🎯`, timestamp: Date.now() }]
            });
        });
    }
    
    function sendQuestion(q) {
        if (!q) return;
        playMessage();
        database.ref('rooms/' + currentRoomId).once('value', snap => {
            const room = snap.val();
            if (!room || room.gameEnded) return;
            const isHost = currentPlayer === 'host';
            const myTurn = (isHost && room.turn === 'host') || (!isHost && room.turn === 'guest');
            if (!myTurn || room.waitingForAnswer) { showMessage("❌ ليس دورك!", true); return; }
            database.ref('rooms/' + currentRoomId).update({
                messages: [...(room.messages || []), { from: currentPlayer, text: `❓ ${q}`, timestamp: Date.now() }],
                waitingForAnswer: true,
                currentQuestion: q,
                turn: isHost ? 'guest' : 'host'
            });
        });
    }
    
    function sendAnswer(answer) {
        playClick();
        database.ref('rooms/' + currentRoomId).once('value', snap => {
            const room = snap.val();
            if (!room || room.gameEnded) return;
            const isHost = currentPlayer === 'host';
            const myTurn = (isHost && room.turn === 'host') || (!isHost && room.turn === 'guest');
            if (!myTurn || !room.waitingForAnswer) { showMessage("❌ ليس دورك للإجابة!", true); return; }
            const answerText = answer === 'yes' ? '✅ نعم' : '❌ لا';
            database.ref('rooms/' + currentRoomId).update({
                messages: [...(room.messages || []), { from: currentPlayer, text: answerText, timestamp: Date.now() }],
                waitingForAnswer: false,
                currentQuestion: null,
                turn: currentPlayer
            });
        });
    }
    
    function makeGuess(guess) {
        if (!guess) return;
        playClick();
        database.ref('rooms/' + currentRoomId).once('value', snap => {
            const room = snap.val();
            if (!room || room.gameEnded) return;
            const isHost = currentPlayer === 'host';
            const opponentSecret = isHost ? room.guest.secretItem : room.host.secretItem;
            if (guess === opponentSecret) {
                playWin();
                const p = getRandomPunishment();
                database.ref('rooms/' + currentRoomId).update({
                    winner: currentPlayer,
                    gameEnded: true,
                    phase: 'finished',
                    messages: [...(room.messages || []), { from: 'system', text: `🎉🏆 ${isHost ? 'المضيف' : 'الضيف'} فاز! العنصر السري: ${opponentSecret} 🏆🎉`, timestamp: Date.now() }]
                });
                showMessage(`🎉 فزت! العنصر السري كان: ${opponentSecret}`);
            } else {
                playLose();
                showMessage(`❌ خطأ! "${guess}" ليس صحيحاً.`, true);
                database.ref('rooms/' + currentRoomId).update({
                    messages: [...(room.messages || []), { from: 'system', text: `❌ تخمين خاطئ: "${guess}"`, timestamp: Date.now() }],
                    turn: isHost ? 'guest' : 'host',
                    waitingForAnswer: false,
                    currentQuestion: null
                });
            }
        });
    }
    
    function newRound() {
        playClick();
        database.ref('rooms/' + currentRoomId).update({
            'host/secretItem': null, 'guest/secretItem': null,
            'host/hasItem': false, 'guest/hasItem': false,
            topic: null, topicChosen: false,
            messages: [], waitingForAnswer: false, currentQuestion: null,
            turn: 'host', phase: 'topic_selection', gameEnded: false, winner: null
        });
    }
    
    function renderGame(room) {
        const isHost = currentPlayer === 'host';
        const mySecret = isHost ? room.host.secretItem : room.guest.secretItem;
        const myTurn = (isHost && room.turn === 'host') || (!isHost && room.turn === 'guest');
        const isAnswerTurn = myTurn && room.waitingForAnswer;
        const isQuestionTurn = myTurn && !room.waitingForAnswer && !room.gameEnded;
        
        let html = `
            <div class="room-section">
                <div>🏠 رمز الغرفة: <strong class="room-code">${currentRoomId}</strong></div>
                <button onclick="copyCode();playClick()" class="btn-green">📋 نسخ الرمز</button>
                <button onclick="backToMenu()" class="btn-red">🚪 مغادرة</button>
            </div>
            <div class="players">
                <div class="player-card ${room.turn === 'host' && !room.gameEnded ? 'active' : ''} ${room.winner === 'host' ? 'winner' : ''}">
                    <div class="player-name">${isHost ? '👤 أنت (المضيف)' : '👥 المضيف'}</div>
                    ${mySecret && room.phase === 'playing' && !room.gameEnded && isHost ? `<div class="secret-item">🔒 عنصرك السري: ${mySecret}</div>` : ''}
                    ${room.turn === 'host' && !room.gameEnded ? '<div class="turn-badge">✨ دورك الآن ✨</div>' : ''}
                </div>
                <div class="player-card ${room.turn === 'guest' && !room.gameEnded ? 'active' : ''} ${room.winner === 'guest' ? 'winner' : ''}">
                    <div class="player-name">${!isHost ? '👤 أنت (الضيف)' : '👥 الضيف'}</div>
                    ${!isHost && mySecret && room.phase === 'playing' && !room.gameEnded ? `<div class="secret-item">🔒 عنصرك السري: ${mySecret}</div>` : ''}
                    ${room.turn === 'guest' && !room.gameEnded ? '<div class="turn-badge">✨ دورك الآن ✨</div>' : ''}
                </div>
            </div>
        `;
        
        if (room.phase === 'topic_selection' || !room.topicChosen) {
            const topicOptions = Object.keys(TOPICS).map(key => `<button class="topic-btn" onclick="selectTopic('${key}');playClick()">${TOPICS[key].name}</button>`).join('');
            html += `
                <div class="waiting">
                    <h3>🎲 اختر الموضوع 🎲</h3>
                    ${isHost ? `<div class="topic-selector">${topicOptions}</div><div class="host-only">🔰 فقط المضيف يختار الموضوع</div>` : `<div class="feedback">⏳ في انتظار اختيار المضيف للموضوع...</div><div class="spinner"></div>`}
                </div>
            `;
        } else if (room.phase === 'playing' && !room.gameEnded) {
            const messagesHtml = (room.messages || []).map(msg => {
                let sender = '';
                if (msg.from === 'system') sender = '📢 ';
                else if (msg.from === 'host') sender = '👤 المضيف: ';
                else sender = '👥 الضيف: ';
                return `<div class="message ${msg.from === currentPlayer ? 'my-message' : (msg.from === 'system' ? 'system-message' : 'opponent-message')}">${sender}${msg.text}</div>`;
            }).join('');
            
            html += `
                <div style="background:linear-gradient(135deg,#4ECDC4,#2c7a6e); color:white; padding:12px; border-radius:32px; text-align:center;">🎯 الموضوع: ${TOPICS[room.topic].name}</div>
                <div class="chat-area" id="chatArea">${messagesHtml || '<div style="text-align:center;">✨ ابدأ الأسئلة! ✨</div>'}</div>
            `;
            
            if (isQuestionTurn) {
                const suggestions = ["هل هو إنسان؟", "هل هو حيوان؟", "هل هو طعام؟", "هل هو مشهور؟", "هل هو لون؟", "هل يمكن أكله؟"];
                html += `
                    <div class="question-input">
                        <input type="text" id="questionInput" placeholder="اسأل سؤالاً (نعم/لا)..." />
                        <button onclick="sendQuestionFromGame()" class="btn-cyan">📤 إرسال</button>
                    </div>
                    <div class="suggestions">
                        ${suggestions.map(s => `<button class="suggestion-btn" onclick="document.getElementById('questionInput').value='${s}'">${s}</button>`).join('')}
                    </div>
                `;
            } else if (isAnswerTurn) {
                html += `
                    <div class="current-question">❓ السؤال: ${room.currentQuestion}</div>
                    <div class="answer-buttons">
                        <button onclick="sendAnswerFromGame('yes')" class="btn-yes">✅ نعم</button>
                        <button onclick="sendAnswerFromGame('no')" class="btn-no">❌ لا</button>
                    </div>
                `;
            } else {
                html += `<div class="feedback">⏳ في انتظار دور ${room.turn === 'host' ? 'المضيف' : 'الضيف'}...</div>`;
            }
            
            html += `
                <div class="guess-area">
                    <input type="text" id="guessInput" placeholder="🔍 تخمين العنصر السري..." />
                    <button onclick="makeGuessFromGame()" class="btn-orange">🎯 خمن!</button>
                </div>
            `;
            
            setTimeout(() => { const chat = document.getElementById('chatArea'); if (chat) chat.scrollTop = chat.scrollHeight; }, 100);
        } else if (room.phase === 'finished') {
            const p = getRandomPunishment();
            const opponentSecret = isHost ? room.guest.secretItem : room.host.secretItem;
            html += `
                <div class="waiting">
                    <h2>${room.winner === currentPlayer ? '🎉 فزت! مبروك 🎉' : '😔 خسرت! 😔'}</h2>
                    <div class="feedback">🔍 العنصر السري للخصم: ${opponentSecret}</div>
                    <button onclick="showPunishment('${p}', ${room.winner === currentPlayer})" class="btn-purple">${room.winner === currentPlayer ? '🎲 اختر حكماً للخاسر' : '😭 عرض الحكم'}</button>
                    <button onclick="newRound()" class="btn-orange">🔄 جولة جديدة</button>
                </div>
            `;
        }
        
        document.getElementById('mainContent').innerHTML = html;
    }
    
    // ربط الدوال العامة
    window.selectTopic = selectTopic;
    window.sendQuestionFromGame = () => { const q = document.getElementById('questionInput')?.value; if (q) { sendQuestion(q); document.getElementById('questionInput').value = ''; } };
    window.sendAnswerFromGame = (a) => sendAnswer(a);
    window.makeGuessFromGame = () => { const g = document.getElementById('guessInput')?.value; if (g) { makeGuess(g); document.getElementById('guessInput').value = ''; } };
    window.newRound = newRound;
    window.playClick = playClick;
    
    function showMainMenu() {
        document.getElementById('mainContent').innerHTML = `
            <div class="main-buttons">
                <button onclick="createRoom()" class="main-btn" style="background:linear-gradient(135deg,#FF8C42,#e67e22);">✨ إنشاء غرفة جديدة ✨</button>
                <button onclick="joinRoom()" class="main-btn" style="background:linear-gradient(135deg,#4ECDC4,#2c7a6e);">🔑 انضمام إلى غرفة 🔑</button>
            </div>
            <div class="room-section">
                <h3 style="color:#FFD966;">📖 طريقة اللعب:</h3>
                <p style="color:white; margin:10px 0;">1️⃣ <strong>المضيف</strong> يختار الموضوع من <strong>15 موضوعاً</strong></p>
                <p style="color:white; margin:10px 0;">2️⃣ كل لاعب يحصل على <strong>عنصر سري عشوائي</strong></p>
                <p style="color:white; margin:10px 0;">3️⃣ <strong style="color:#FFD966;">المضيف يبدأ</strong> بطرح الأسئلة (نعم/لا)</p>
                <p style="color:white; margin:10px 0;">4️⃣ بعد الإجابة، <strong>يبقى الدور عند نفس اللاعب</strong> لطرح سؤال جديد</p>
                <p style="color:white; margin:10px 0;">5️⃣ يمكن التخمين في أي وقت - من يخمن العنصر الصحيح <strong>يفوز!</strong></p>
                <p style="color:white; margin:10px 0;">6️⃣ <strong style="color:#FF8C42;">🎭 عند الفوز، اختر حكماً مضحكاً للخاسر!</strong></p>
            </div>
        `;
    }
    
    showMainMenu();
</script>
</body>
</html>
