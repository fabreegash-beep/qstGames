    <!-- Audio Effects (Web Audio) -->
    <script>
        // Simple sound effects using Web Audio API
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(freq = 660, duration = 0.2, type = 'sine') {
            try {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = freq;
                osc.type = type;
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
                osc.start();
                osc.stop(now + duration);
            } catch(e) { console.log("Audio not allowed"); }
        }
        function playWin() { playBeep(880, 0.4, 'sine'); setTimeout(() => playBeep(1320, 0.5, 'sine'), 200); }
        function playLose() { playBeep(440, 0.6, 'sawtooth'); }
        function playClick() { playBeep(660, 0.08, 'sine'); }
        function playTurn() { playBeep(523.25, 0.15, 'triangle'); }
        function playMessage() { playBeep(880, 0.05, 'sine'); }
    </script>

    let currentLang = 'fr';
    let currentRoomId = null, currentPlayer = null, roomListener = null;
    
    const TOPICS = {

        sports: { name_fr: "⚽ Sports", name_ar: "⚽ رياضات", items: ["Football", "Basketball", "Tennis", "Natation", "Boxe"] },
        professions: { name_fr: "👨‍⚕️ Métiers", name_ar: "👨‍⚕️ مهن", items: ["Médecin", "Ingénieur", "Enseignant", "Avocat", "Pilote"] },

        fruits: { name_fr: "🍎 Fruits", name_ar: "🍎 فواكه", items: ["Pomme", "Banane", "Orange", "Fraise", "Mangue"] }
    };
    
    function t(key, ...args) { let txt = lang[currentLang][key] || key; return txt; }
    function getTopicDisplay(topicKey) { return currentLang === 'fr' ? TOPICS[topicKey].name_fr : TOPICS[topicKey].name_ar; }
    function getRandomItem(topicKey) { return TOPICS[topicKey].items[Math.floor(Math.random() * TOPICS[topicKey].items.length)]; }
    function getRandomPunishment() { const list = lang[currentLang].punishmentList; return list[Math.floor(Math.random() * list.length)]; }
    
    function setLanguage(lang) {
        currentLang = lang;
        document.getElementById('langFrBtn').classList.toggle('active', lang === 'fr');
        document.getElementById('langArBtn').classList.toggle('active', lang === 'ar');
        document.getElementById('gameTitle').innerHTML = currentLang === 'fr' ? "❓ Ask & Win | Demande et Gagne ❓" : "❓ اسأل وتربح | العب مع أصدقائك ❓";
        if (!currentRoomId) showMainMenu(); else if (roomListener) database.ref('rooms/' + currentRoomId).once('value', snap => renderGame(snap.val()));
    }
    
    function showMessage(msg, isError = false) { playClick(); const div = document.createElement('div'); div.textContent = msg; div.style.cssText = `position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: ${isError ? '#e74c3c' : '#2ecc71'}; color: white; padding: 12px 24px; border-radius: 60px; z-index: 9999; font-weight: bold; backdrop-filter: blur(8px);`; document.body.appendChild(div); setTimeout(() => div.remove(), 2800); }
    
    function showPunishment(punishment, isWinner) {
        playWin();
        const modal = document.createElement('div'); modal.className = 'punishment-modal';
        modal.innerHTML = `<div class="punishment-content"><div style="font-size:3rem;">${isWinner ? '🏆🎭' : '😭⚠️'}</div><h3>${isWinner ? t('choosePunishment') : t('punishmentForLoser')}</h3><div class="punishment-text">${punishment}</div><button onclick="this.closest('.punishment-modal').remove(); playClick();" class="btn-green">${t('execute')}</button>${isWinner ? `<button onclick="changePunishmentModal(this)" class="btn-orange">${t('another')}</button>` : ''}</div>`;
        document.body.appendChild(modal);
    }
    window.changePunishmentModal = (btn) => { const modal = btn.closest('.punishment-modal'); modal.querySelector('.punishment-text').innerHTML = getRandomPunishment(); playClick(); };
    
    function createRoom() {
        playClick();
        const roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
        currentRoomId = roomId; currentPlayer = 'host';
        const roomData = { host: { joined: true, secretItem: null, hasItem: false }, guest: { joined: false, secretItem: null, hasItem: false }, topic: null, topicChosen: false, turn: 'host', phase: 'topic_selection', gameEnded: false, winner: null, messages: [], waitingForAnswer: false, currentQuestion: null };
        database.ref('rooms/' + roomId).set(roomData).then(() => { listenToRoom(roomId); showWaitingRoom(); });
    }
    
    function joinRoom() {
        playClick();
        const roomId = prompt(currentLang === 'fr' ? "🔑 Entrez le code de la salle:" : "🔑 أدخل رمز الغرفة:", "").toUpperCase();
        if (!roomId) return;
        database.ref('rooms/' + roomId).once('value').then(snap => {
            const room = snap.val();
            if (!room) { showMessage(currentLang === 'fr' ? "Salle introuvable!" : "الغرفة غير موجودة!", true); return; }
            if (room.guest.joined) { showMessage(currentLang === 'fr' ? "Salle pleine!" : "الغرفة ممتلئة!", true); return; }
            currentRoomId = roomId; currentPlayer = 'guest';
            database.ref('rooms/' + roomId).update({ 'guest/joined': true }).then(() => { listenToRoom(roomId); showMessage(currentLang === 'fr' ? "✅ Rejoint!" : "✅ تم الانضمام!"); });
        });
    }
    
    function listenToRoom(roomId) { if (roomListener) roomListener.off(); roomListener = database.ref('rooms/' + roomId); roomListener.on('value', (snap) => { const room = snap.val(); if (!room) { showMainMenu(); return; } renderGame(room); }); }
    
    function showWaitingRoom() { document.getElementById('mainContent').innerHTML = `<div class="room-section"><div class="room-code">${currentRoomId}</div><button onclick="copyCode();playClick()" class="btn-green">📋 ${t('copy')}</button><div class="spinner"></div><button onclick="backToMenu()" class="btn-red">🚪 ${t('leave')}</button></div>`; }
    function copyCode() { navigator.clipboard.writeText(currentRoomId); showMessage(currentLang === 'fr' ? "✅ Code copié!" : "✅ تم نسخ الرمز!"); }
    function backToMenu() { if (roomListener) roomListener.off(); if (currentRoomId) database.ref('rooms/' + currentRoomId).remove(); currentRoomId = null; currentPlayer = null; showMainMenu(); }
    
    function selectTopic(topicKey) {
        playClick();
        database.ref('rooms/' + currentRoomId).once('value', snap => {
            const room = snap.val(); if (!room || room.topicChosen) return;
            const hostItem = getRandomItem(topicKey), guestItem = getRandomItem(topicKey);
            database.ref('rooms/' + currentRoomId).update({ topic: topicKey, topicChosen: true, 'host/secretItem': hostItem, 'host/hasItem': true, 'guest/secretItem': guestItem, 'guest/hasItem': true, phase: 'playing', turn: 'host', messages: [{ from: 'system', text: currentLang === 'fr' ? `🎯 Thème: ${getTopicDisplay(topicKey)}` : `🎯 الموضوع: ${getTopicDisplay(topicKey)}`, timestamp: Date.now() }] });
        });
    }
    
    function sendQuestion(q) { if (!q) return; playMessage(); database.ref('rooms/' + currentRoomId).once('value', snap => { const room = snap.val(); if (!room || room.gameEnded) return; const isHost = currentPlayer === 'host'; const myTurn = (isHost && room.turn === 'host') || (!isHost && room.turn === 'guest'); if (!myTurn || room.waitingForAnswer) { showMessage(currentLang === 'fr' ? "Pas ton tour!" : "ليس دورك!", true); return; } database.ref('rooms/' + currentRoomId).update({ messages: [...(room.messages || []), { from: currentPlayer, text: `❓ ${q}`, timestamp: Date.now() }], waitingForAnswer: true, currentQuestion: q, turn: isHost ? 'guest' : 'host' }); }); }
    function sendAnswer(answer) { playClick(); database.ref('rooms/' + currentRoomId).once('value', snap => { const room = snap.val(); if (!room || room.gameEnded) return; const isHost = currentPlayer === 'host'; const myTurn = (isHost && room.turn === 'host') || (!isHost && room.turn === 'guest'); if (!myTurn || !room.waitingForAnswer) { showMessage(currentLang === 'fr' ? "Pas ton tour pour répondre!" : "ليس دورك للإجابة!", true); return; } const ansText = answer === 'yes' ? (currentLang === 'fr' ? '✅ Oui' : '✅ نعم') : (currentLang === 'fr' ? '❌ Non' : '❌ لا'); database.ref('rooms/' + currentRoomId).update({ messages: [...(room.messages || []), { from: currentPlayer, text: ansText, timestamp: Date.now() }], waitingForAnswer: false, currentQuestion: null, turn: currentPlayer }); }); }
    function makeGuess(guess) { if (!guess) return; playClick(); database.ref('rooms/' + currentRoomId).once('value', snap => { const room = snap.val(); if (!room || room.gameEnded) return; const isHost = currentPlayer === 'host'; const opponentSecret = isHost ? room.guest.secretItem : room.host.secretItem; if (guess === opponentSecret) { playWin(); const p = getRandomPunishment(); database.ref('rooms/' + currentRoomId).update({ winner: currentPlayer, gameEnded: true, phase: 'finished', messages: [...(room.messages || []), { from: 'system', text: `🎉🏆 ${currentPlayer === 'host' ? (currentLang === 'fr' ? "Hôte" : "المضيف") : (currentLang === 'fr' ? "Invité" : "الضيف")} ${currentLang === 'fr' ? 'a gagné!' : 'فاز!'} (${opponentSecret}) 🏆🎉`, timestamp: Date.now() }] }); showMessage(`${t('win')} ${opponentSecret}`); } else { playLose(); showMessage(`${currentLang === 'fr' ? '❌ Faux!' : '❌ خطأ!'} "${guess}"`, true); database.ref('rooms/' + currentRoomId).update({ messages: [...(room.messages || []), { from: 'system', text: `❌ ${currentLang === 'fr' ? 'Mauvaise devinette:' : 'تخمين خاطئ:'} "${guess}"`, timestamp: Date.now() }], turn: isHost ? 'guest' : 'host', waitingForAnswer: false, currentQuestion: null }); } }); }
    function newRound() { playClick(); database.ref('rooms/' + currentRoomId).update({ 'host/secretItem': null, 'guest/secretItem': null, 'host/hasItem': false, 'guest/hasItem': false, topic: null, topicChosen: false, messages: [], waitingForAnswer: false, currentQuestion: null, turn: 'host', phase: 'topic_selection', gameEnded: false, winner: null }); }
    
    function renderGame(room) {
        const isHost = currentPlayer === 'host'; const mySecret = isHost ? room.host.secretItem : room.guest.secretItem; const myTurn = (isHost && room.turn === 'host') || (!isHost && room.turn === 'guest'); const isAnswerTurn = myTurn && room.waitingForAnswer; const isQuestionTurn = myTurn && !room.waitingForAnswer && !room.gameEnded;
        let html = `<div class="room-section"><div>🏠 ${currentLang === 'fr' ? 'Code:' : 'رمز:'} <strong class="room-code">${currentRoomId}</strong></div><button onclick="copyCode();playClick()" class="btn-green">📋 ${t('copy')}</button><button onclick="backToMenu()" class="btn-red">🚪 ${t('leave')}</button></div><div class="players"><div class="player-card ${room.turn === 'host' && !room.gameEnded ? 'active' : ''} ${room.winner === 'host' ? 'winner' : ''}"><div class="player-name">${isHost ? `👤 ${currentLang === 'fr' ? 'Toi (Hôte)' : 'أنت (المضيف)'}` : `👥 ${currentLang === 'fr' ? 'Hôte' : 'المضيف'}`}</div>${mySecret && room.phase === 'playing' && !room.gameEnded && isHost ? `<div class="secret-item">🔒 ${currentLang === 'fr' ? 'Ton objet:' : 'عنصرك:'} ${mySecret}</div>` : ''}${room.turn === 'host' && !room.gameEnded ? `<div class="turn-badge">✨ ${t('yourTurn')} ✨</div>` : ''}</div><div class="player-card ${room.turn === 'guest' && !room.gameEnded ? 'active' : ''} ${room.winner === 'guest' ? 'winner' : ''}"><div class="player-name">${!isHost ? `👤 ${currentLang === 'fr' ? 'Toi (Invité)' : 'أنت (الضيف)'}` : `👥 ${currentLang === 'fr' ? 'Invité' : 'الضيف'}`}</div>${!isHost && mySecret && room.phase === 'playing' && !room.gameEnded ? `<div class="secret-item">🔒 ${currentLang === 'fr' ? 'Ton objet:' : 'عنصرك:'} ${mySecret}</div>` : ''}${room.turn === 'guest' && !room.gameEnded ? `<div class="turn-badge">✨ ${t('yourTurn')} ✨</div>` : ''}</div></div>`;
        if (room.phase === 'topic_selection' || !room.topicChosen) {
            const topicOptions = Object.keys(TOPICS).map(key => `<button class="topic-btn" onclick="selectTopic('${key}');playClick()">${getTopicDisplay(key)}</button>`).join('');
            html += `<div class="waiting"><h3>${t('chooseTopic')}</h3>${isHost ? `<div class="topic-selector">${topicOptions}</div><div class="host-only" style="background:#FFD166; padding:8px; border-radius:40px;">🔰 ${t('hostOnly')}</div>` : `<div class="feedback">${t('waitingHost')}</div><div class="spinner"></div>`}</div>`;
        } else if (room.phase === 'playing' && !room.gameEnded) {
            const messagesHtml = (room.messages || []).map(msg => `<div class="message ${msg.from === currentPlayer ? 'my-message' : (msg.from === 'system' ? 'system-message' : 'opponent-message')}">${msg.from === 'system' ? '📢 ' : (msg.from === 'host' ? (currentLang === 'fr' ? '👤 Hôte: ' : '👤 المضيف: ') : (currentLang === 'fr' ? '👥 Invité: ' : '👥 الضيف: '))}${msg.text}</div>`).join('');
            html += `<div style="background:linear-gradient(135deg,#4ECDC4,#2c7a6e); color:white; padding:12px; border-radius:32px; text-align:center;">🎯 ${currentLang === 'fr' ? 'Thème:' : 'الموضوع:'} ${getTopicDisplay(room.topic)}</div><div class="chat-area" id="chatArea">${messagesHtml || '<div style="text-align:center;">✨ ' + (currentLang === 'fr' ? 'Commencez!' : 'ابدا!') + ' ✨</div>'}</div>`;
            if (isQuestionTurn) html += `<div class="question-input"><input type="text" id="questionInput" placeholder="${currentLang === 'fr' ? 'Pose une question (Oui/Non)...' : 'اسأل سؤالاً (نعم/لا)...'}" /><button onclick="sendQuestionFromGame()" class="btn-cyan">📤 ${t('send')}</button></div><div class="suggestions" style="display:flex; gap:8px; flex-wrap:wrap;">${['Est-ce un être vivant?', 'Est-ce un objet?', 'Est-ce célèbre?', 'Est-ce que ça se mange?'].map(s => `<button class="suggestion-btn" onclick="document.getElementById('questionInput').value='${s}'" style="background:rgba(255,255,255,0.2); border-radius:40px; padding:6px 14px;">${s}</button>`).join('')}</div>`;
            else if (isAnswerTurn) html += `<div class="current-question">❓ ${currentLang === 'fr' ? 'Question:' : 'سؤال:'} ${room.currentQuestion}</div><div class="answer-buttons"><button onclick="sendAnswerFromGame('yes')" class="btn-yes">${t('yes')}</button><button onclick="sendAnswerFromGame('no')" class="btn-no">${t('no')}</button></div>`;
            else html += `<div class="feedback" style="background:rgba(0,0,0,0.5); border-radius:40px; padding:14px; text-align:center;">⏳ ${currentLang === 'fr' ? 'En attente du tour de' : 'في انتظار دور'} ${room.turn === 'host' ? (currentLang === 'fr' ? "l'hôte..." : "المضيف...") : (currentLang === 'fr' ? "l'invité..." : "الضيف...")}</div>`;
            html += `<div class="guess-area"><input type="text" id="guessInput" placeholder="🔍 ${t('guess')}..." /><button onclick="makeGuessFromGame()" class="btn-orange">🎯 ${t('guess')}</button></div>`;
            setTimeout(() => { const chat = document.getElementById('chatArea'); if (chat) chat.scrollTop = chat.scrollHeight; }, 100);
        } else if (room.phase === 'finished') {
            const p = getRandomPunishment(); const opponentSecret = isHost ? room.guest.secretItem : room.host.secretItem;
            html += `<div class="waiting"><h2>${room.winner === currentPlayer ? t('win') : t('lose')}</h2><div class="feedback">${t('secretWas')} ${opponentSecret}</div><button onclick="showPunishment('${p}', ${room.winner === currentPlayer})" class="btn-purple">${room.winner === currentPlayer ? t('choosePunishment') : t('punishmentForLoser')}</button><button onclick="newRound()" class="btn-orange">${t('newRound')}</button></div>`;
        }
        document.getElementById('mainContent').innerHTML = html;
    }
    
    window.selectTopic = selectTopic; window.sendQuestionFromGame = () => { const q = document.getElementById('questionInput')?.value; if (q) { sendQuestion(q); document.getElementById('questionInput').value = ''; } }; window.sendAnswerFromGame = (a) => sendAnswer(a); window.makeGuessFromGame = () => { const g = document.getElementById('guessInput')?.value; if (g) { makeGuess(g); document.getElementById('guessInput').value = ''; } }; window.newRound = newRound; window.setLanguage = setLanguage;
    
    function showMainMenu() {
        document.getElementById('mainContent').innerHTML = `<div class="main-buttons" style="display:flex; gap:20px; justify-content:center; flex-wrap:wrap;"><button onclick="createRoom()" style="background:linear-gradient(135deg,#FF6B6B,#c0392b);">✨ ${t('create')} ✨</button><button onclick="joinRoom()" style="background:linear-gradient(135deg,#4ECDC4,#2c7a6e);">🔑 ${t('join')} 🔑</button></div><div class="room-section"><h3>${t('howto')}</h3><p>${t('step1')}</p><p>${t('step2')}</p><p>${t('step3')}</p><p>${t('step4')}</p><p>${t('step5')}</p><p>${t('step6')}</p></div>`;
    }
    showMainMenu();
</script>
</body>
</html>
