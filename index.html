<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎯 اسأل وتربح 🎯</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --magic-purple: #9b59b6;
            --magic-pink: #e91e63;
            --magic-blue: #3498db;
            --magic-cyan: #00d4aa;
            --magic-gold: #f39c12;
            --magic-orange: #ff6b35;
            --magic-green: #2ecc71;
            --dark-bg: #0a0a1a;
            --card-bg: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.12);
        }

        body {
            min-height: 100vh;
            background: var(--dark-bg);
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .magic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .floating-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            animation: float 8s infinite ease-in-out;
            opacity: 0.4;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(180deg); }
        }

        /* Main Container */
        .game-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            padding: 16px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Header */
        .game-header {
            text-align: center;
            padding: 20px 0 30px;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .game-logo {
            font-size: 3rem;
            margin-bottom: 8px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .game-title {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b9d, #c44569, #f8b500, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 107, 157, 0.5);
            margin-bottom: 8px;
        }

        .game-subtitle {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
        }

        /* Buttons */
        .magic-btn {
            position: relative;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 280px;
            margin: 10px auto;
        }

        .magic-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.5s;
        }

        .magic-btn:hover::before {
            left: 100%;
        }

        .magic-btn:active {
            transform: scale(0.95);
        }

        .btn-primary { background: linear-gradient(135deg, var(--magic-pink), var(--magic-purple)); color: white; box-shadow: 0 8px 25px rgba(233, 30, 99, 0.4); }
        .btn-primary:hover { box-shadow: 0 12px 35px rgba(233, 30, 99, 0.6); transform: translateY(-3px); }
        .btn-secondary { background: linear-gradient(135deg, var(--magic-cyan), var(--magic-blue)); color: white; box-shadow: 0 8px 25px rgba(52, 152, 219, 0.4); }
        .btn-success { background: linear-gradient(135deg, var(--magic-green), #27ae60); color: white; box-shadow: 0 8px 25px rgba(46, 204, 113, 0.4); }
        .btn-warning { background: linear-gradient(135deg, var(--magic-orange), var(--magic-gold)); color: white; box-shadow: 0 8px 25px rgba(243, 156, 18, 0.4); }
        .btn-mic { background: linear-gradient(135deg, #9b59b6, #8e44ad); color: white; box-shadow: 0 8px 25px rgba(155, 89, 182, 0.4); }

        /* Cards */
        .magic-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            animation: fadeInUp 0.6s ease-out;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .room-code-display { text-align: center; padding: 16px; }
        .room-code-label { font-size: 0.9rem; color: rgba(255, 255, 255, 0.6); margin-bottom: 8px; }
        .room-code-number {
            font-size: 2.5rem;
            font-weight: 900;
            font-family: monospace;
            background: linear-gradient(135deg, var(--magic-gold), var(--magic-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 8px;
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(243, 156, 18, 0.5)); }
            50% { filter: drop-shadow(0 0 25px rgba(243, 156, 18, 0.8)); }
        }

        /* Players Section */
        .players-container { display: flex; gap: 12px; margin-bottom: 16px; }
        .player-badge {
            flex: 1;
            padding: 16px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .player-badge.host { background: linear-gradient(135deg, rgba(155, 89, 182, 0.3), rgba(142, 68, 173, 0.3)); border: 2px solid rgba(155, 89, 182, 0.5); }
        .player-badge.guest { background: linear-gradient(135deg, rgba(52, 152, 219, 0.3), rgba(41, 128, 185, 0.3)); border: 2px solid rgba(52, 152, 219, 0.5); }

        .player-badge.active {
            transform: scale(1.05);
            animation: active-pulse 1.5s infinite;
        }

        @keyframes active-pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); }
            50% { box-shadow: 0 0 40px rgba(255, 255, 255, 0.4); }
        }

        .player-icon { font-size: 2rem; margin-bottom: 8px; }
        .player-name { font-weight: 700; font-size: 0.95rem; color: white; }
        .player-turn-indicator { font-size: 0.8rem; color: var(--magic-gold); margin-top: 6px; opacity: 0; }
        .player-badge.active .player-turn-indicator { opacity: 1; animation: blink 1s infinite; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .secret-item {
            background: linear-gradient(135deg, var(--magic-purple), var(--magic-pink));
            color: white;
            padding: 8px 14px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
            margin-top: 10px;
            display: inline-block;
            animation: secret-reveal 0.5s ease-out;
            box-shadow: 0 4px 15px rgba(155, 89, 182, 0.4);
        }

        @keyframes secret-reveal {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* Topic Selector */
        .topics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 16px; }
        .topic-btn {
            padding: 16px 12px;
            border-radius: 16px;
            border: none;
            background: var(--card-bg);
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .topic-btn:hover {
            transform: translateY(-5px);
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.3), rgba(155, 89, 182, 0.3));
            border-color: var(--magic-pink);
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.3);
        }

        .topic-icon { font-size: 1.8rem; }

        /* Chat Area */
        .chat-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 24px;
            padding: 16px;
            max-height: 40vh;
            overflow-y: auto;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-track { background: transparent; }
        .chat-container::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 3px; }

        .message {
            margin-bottom: 12px;
            padding: 12px 18px;
            border-radius: 20px;
            max-width: 85%;
            word-wrap: break-word;
            animation: messageSlide 0.3s ease-out;
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .message.my-message { background: linear-gradient(135deg, var(--magic-pink), var(--magic-purple)); color: white; margin-right: auto; border-bottom-right-radius: 6px; }
        .message.opponent-message { background: var(--glass); color: white; margin-left: auto; border-bottom-left-radius: 6px; backdrop-filter: blur(10px); }
        .message.system-message { background: linear-gradient(135deg, var(--magic-gold), var(--magic-orange)); color: white; text-align: center; margin: 16px auto; width: 90%; font-weight: 700; border-radius: 20px; }
        .message.question-message { background: linear-gradient(135deg, var(--magic-blue), var(--magic-cyan)); color: white; margin-right: auto; border-bottom-right-radius: 6px; }
        .message.answer-yes { background: linear-gradient(135deg, var(--magic-green), #27ae60); color: white; margin-left: auto; }
        .message.answer-no { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; margin-left: auto; }
        .message.guess-message { background: linear-gradient(135deg, var(--magic-gold), var(--magic-orange)); color: white; margin: auto; text-align: center; }

        .audio-message {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            padding: 10px 18px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .audio-message:hover { background: rgba(0, 0, 0, 0.5); transform: scale(1.02); }
        .audio-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--magic-pink), var(--magic-purple)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; animation: sound-wave 1s infinite; }

        @keyframes sound-wave { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .sender-badge { font-size: 0.75rem; opacity: 0.7; margin-bottom: 4px; }

        /* Input Fields */
        .magic-input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            font-family: 'Tajawal', sans-serif;
            outline: none;
            transition: all 0.3s ease;
            margin-bottom: 12px;
        }

        .magic-input:focus { border-color: var(--magic-cyan); box-shadow: 0 0 20px rgba(0, 212, 170, 0.3); background: rgba(255, 255, 255, 0.15); }
        .magic-input::placeholder { color: rgba(255, 255, 255, 0.5); }

        .magic-textarea {
            width: 100%;
            padding: 16px 20px;
            border-radius: 24px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            font-family: 'Tajawal', sans-serif;
            outline: none;
            resize: none;
            transition: all 0.3s ease;
            margin-bottom: 12px;
        }

        .magic-textarea:focus { border-color: var(--magic-cyan); box-shadow: 0 0 20px rgba(0, 212, 170, 0.3); }

        /* Answer Buttons */
        .answer-buttons { display: flex; gap: 12px; margin: 16px 0; }
        .answer-btn {
            flex: 1;
            padding: 18px;
            border-radius: 20px;
            border: none;
            font-size: 1.2rem;
            font-weight: 800;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .answer-btn.yes { background: linear-gradient(135deg, var(--magic-green), #27ae60); color: white; box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4); }
        .answer-btn.no { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; box-shadow: 0 6px 20px rgba(231, 76, 60, 0.4); }
        .answer-btn:hover { transform: translateY(-3px); }
        .answer-btn:active { transform: scale(0.95); }

        /* Recording Indicator */
        .rec-dot { width: 16px; height: 16px; background: #e74c3c; border-radius: 50%; animation: recording-pulse 1s infinite; }

        @keyframes recording-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.3); } }
        .recording-text { color: #e74c3c; font-weight: 700; font-size: 1.1rem; }

        /* Waiting State */
        .waiting-container { text-align: center; padding: 40px 20px; }
        .waiting-icon { font-size: 4rem; margin-bottom: 20px; animation: waiting-bounce 1.5s infinite; }

        @keyframes waiting-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .waiting-text { font-size: 1.3rem; font-weight: 700; color: white; margin-bottom: 10px; }
        .waiting-subtext { font-size: 0.95rem; color: rgba(255, 255, 255, 0.6); }

        /* Section Titles */
        .section-title { font-size: 1.1rem; font-weight: 700; color: white; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
        .section-title::before { content: ''; width: 4px; height: 24px; background: linear-gradient(135deg, var(--magic-pink), var(--magic-purple)); border-radius: 2px; }

        /* Divider */
        .magic-divider { display: flex; align-items: center; gap: 16px; margin: 20px 0; color: rgba(255, 255, 255, 0.4); font-size: 0.9rem; }
        .magic-divider::before, .magic-divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent); }

        /* Win Modal */
        .win-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            animation: modalFadeIn 0.5s ease-out;
        }

        @keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }

        .win-content {
            background: linear-gradient(135deg, var(--magic-purple), var(--magic-pink));
            padding: 40px;
            border-radius: 32px;
            text-align: center;
            max-width: 350px;
            width: 90%;
            animation: winPop 0.6s ease-out;
            box-shadow: 0 20px 60px rgba(155, 89, 182, 0.5);
        }

        @keyframes winPop {
            0% { transform: scale(0) rotate(-10deg); }
            50% { transform: scale(1.1) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .win-icon { font-size: 5rem; margin-bottom: 20px; animation: win-spin 1s ease-out; }

        @keyframes win-spin { 0% { transform: rotate(-180deg) scale(0); } 100% { transform: rotate(0deg) scale(1); } }
        .win-title { font-size: 2rem; font-weight: 900; color: white; margin-bottom: 16px; }
        .win-message { font-size: 1.1rem; color: rgba(255, 255, 255, 0.9); margin-bottom: 24px; }

        /* Turn Banner */
        .turn-banner {
            background: linear-gradient(135deg, var(--magic-gold), var(--magic-orange));
            color: white;
            padding: 12px 20px;
            border-radius: 16px;
            text-align: center;
            font-weight: 700;
            margin-bottom: 16px;
            animation: turnPulse 2s infinite;
        }

        @keyframes turnPulse { 0%, 100% { box-shadow: 0 0 20px rgba(243, 156, 18, 0.5); } 50% { box-shadow: 0 0 40px rgba(243, 156, 18, 0.8); } }

        /* Topic Selection Title */
        .topic-title { text-align: center; margin-bottom: 20px; }
        .topic-title h3 { font-size: 1.4rem; font-weight: 800; background: linear-gradient(135deg, var(--magic-cyan), var(--magic-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
        .topic-title p { color: rgba(255, 255, 255, 0.6); font-size: 0.95rem; }

        /* Button Group */
        .btn-group { display: flex; flex-direction: column; gap: 12px; align-items: center; }

        /* Mobile optimizations */
        @media (max-width: 400px) {
            .game-title { font-size: 1.5rem; }
            .topics-grid { grid-template-columns: 1fr; }
            .room-code-number { font-size: 2rem; letter-spacing: 6px; }
            .magic-btn { padding: 14px 24px; font-size: 1rem; }
        }

        /* Shake animation for wrong guess */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.5s ease-in-out; }

        /* Music Player */
        .music-player {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(155, 89, 182, 0.95), rgba(142, 68, 173, 0.95));
            backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 8px 32px rgba(155, 89, 182, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 9999;
            max-width: calc(100% - 40px);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(100px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .music-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--magic-pink), var(--magic-purple));
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(233, 30, 99, 0.4);
            flex-shrink: 0;
        }

        .music-btn:hover { transform: scale(1.1); box-shadow: 0 6px 20px rgba(233, 30, 99, 0.6); }
        .music-btn:active { transform: scale(0.95); }

        .music-info { flex: 1; min-width: 0; }
        .music-title { font-size: 0.85rem; font-weight: 700; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .music-status { font-size: 0.75rem; color: rgba(255, 255, 255, 0.7); }

        .volume-control { display: flex; align-items: center; gap: 8px; }
        .volume-icon { font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .volume-icon:hover { transform: scale(1.2); }

        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 80px;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--magic-gold), var(--magic-orange));
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(243, 156, 18, 0.5);
        }

        .equalizer { display: flex; align-items: flex-end; gap: 3px; height: 20px; margin-right: 8px; }
        .eq-bar { width: 4px; background: linear-gradient(to top, var(--magic-gold), var(--magic-pink)); border-radius: 2px; animation: eq-bounce 0.5s ease-in-out infinite alternate; }
        .eq-bar:nth-child(1) { animation-delay: 0s; height: 8px; }
        .eq-bar:nth-child(2) { animation-delay: 0.1s; height: 16px; }
        .eq-bar:nth-child(3) { animation-delay: 0.2s; height: 12px; }
        .eq-bar:nth-child(4) { animation-delay: 0.3s; height: 20px; }

        @keyframes eq-bounce { 0% { transform: scaleY(0.3); } 100% { transform: scaleY(1); } }
        .equalizer.paused .eq-bar { animation: none; height: 4px !important; }

        .close-music {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: none;
            background: #e74c3c;
            color: white;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(231, 76, 60, 0.5);
        }

        .close-music:hover { transform: scale(1.2); background: #c0392b; }
    </style>
</head>
<body>

<div class="magic-bg" id="magicBg"></div>

<div class="game-container" id="app"></div>

<!-- Music Player -->
<div class="music-player" id="musicPlayer">
    <button class="close-music" onclick="toggleMusicPlayer()">✕</button>
    <div class="equalizer" id="equalizer">

        try {
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
            osc.start();
            osc.stop(now + duration);
        } catch(e) { }
    }

    function createRoom() {
        const roomId = Math.floor(1000 + Math.random() * 9000).toString();
        currentRoomId = roomId;
        currentPlayer = 'host';
        database.ref('rooms/' + roomId).set({
            host: { joined: true, secretItem: null },
            guest: { joined: false, secretItem: null },
            phase: 'waiting',
            turn: 'host',
            messages: [],
            waitingForAnswer: false,
            currentQuestion: null
        }).then(() => listenToRoom(roomId));
        playClick();
    }

    function joinRoom() {
        const roomId = prompt("أدخل رقم الغرفة:");
        if (!roomId) return;
        database.ref('rooms/' + roomId).once('value', snap => {
            if (!snap.exists()) { alert("❌ الغرفة غير موجودة!"); return; }
            currentRoomId = roomId;
            currentPlayer = 'guest';
            database.ref('rooms/' + roomId).update({ 'guest/joined': true, phase: 'topic_selection' });
            listenToRoom(roomId);
        });
        playClick();
    }

    function listenToRoom(roomId) {
        if (roomListener) roomListener.off();
        roomListener = database.ref('rooms/' + roomId);
        roomListener.on('value', snap => { const room = snap.val(); if (room) renderGame(room); });
    }

    function selectTopic(topicKey) {
        const topicItems = TOPICS[topicKey].items;
        const hItem = topicItems[Math.floor(Math.random() * topicItems.length)];
        const gItem = topicItems[Math.floor(Math.random() * topicItems.length)];
        database.ref('rooms/' + currentRoomId).update({
            topic: topicKey,
            phase: 'playing',
            'host/secretItem': hItem,
            'guest/secretItem': gItem,
            messages: [{ from: 'system', text: `🎯 الموضوع: ${TOPICS[topicKey].name}` }],
            waitingForAnswer: false,
            currentQuestion: null,
            turn: 'host'
        });
        playSuccess();
    }

    function sendQuestion() {
        const q = document.getElementById('questionInput').value;
        if (!q) return;
        database.ref('rooms/' + currentRoomId).once('value', snap => {
            const room = snap.val();
            const newMessages = [...(room.messages || []), { from: currentPlayer, type: 'question', text: `❓ ${q}` }];
            database.ref('rooms/' + currentRoomId).update({
                messages: newMessages,
                waitingForAnswer: true,
                currentQuestion: q,
                turn: currentPlayer === 'host' ? 'guest' : 'host'
            });
        });
        document.getElementById('questionInput').value = '';
        playClick();
    }

    async function startVoiceRecording() {
        if (isRecording) { stopVoiceRecordingAndSend(); return; }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(audioBlob);
                reader.onloadend = () => {
                    const base64Audio = reader.result;
                    database.ref('rooms/' + currentRoomId).once('value', snap => {
                        const room = snap.val();
                        if (!room) return;
                        const voiceMsg = { from: currentPlayer, type: 'voice', audioData: base64Audio, timestamp: Date.now() };
                        const newMessages = [...(room.messages || []), voiceMsg];
                        database.ref('rooms/' + currentRoomId).update({
                            messages: newMessages,
                            waitingForAnswer: true,
                            currentQuestion: "📢 [رسالة صوتية] استمع ثم أجب",
                            turn: currentPlayer === 'host' ? 'guest' : 'host'
                        });
                    });
                    stream.getTracks().forEach(track => track.stop());
                    isRecording = false;
                    playSuccess();
                };
            };
            mediaRecorder.start();
            isRecording = true;
            const btn = document.getElementById('voiceRecBtn');
            if (btn) { btn.innerHTML = '<span class="rec-dot"></span> جاري التسجيل... اضغط للإيقاف'; btn.classList.add('recording'); }
            playClick();
        } catch(err) { alert("⚠️ يرجى السماح باستخدام الميكروفون"); }
    }

    function stopVoiceRecordingAndSend() {
        if (mediaRecorder && isRecording && mediaRecorder.state === 'recording') mediaRecorder.stop();
    }

    function sendAnswerWithNote(answer) {
        const note = document.getElementById('answerNote').value.trim();
        const baseAnswer = answer === 'yes' ? '✅ نعم' : '❌ لا';
        const finalMsg = note ? `${baseAnswer} (${note})` : baseAnswer;
        database.ref('rooms/' + currentRoomId).once('value', snap => {
            const room = snap.val();
            const msgType = answer === 'yes' ? 'answer-yes' : 'answer-no';
            const newMessages = [...(room.messages || []), { from: currentPlayer, type: msgType, text: finalMsg }];
            database.ref('rooms/' + currentRoomId).update({
                messages: newMessages,
                waitingForAnswer: false,
                currentQuestion: null,
                turn: currentPlayer
            });
        });
        document.getElementById('answerNote').value = '';
        playSuccess();
    }

    function makeGuess() {
        const g = document.getElementById('guessInput').value.trim();
        if (!g) return;
        database.ref('rooms/' + currentRoomId).once('value', snap => {
            const room = snap.val();
            const opponentSecret = currentPlayer === 'host' ? room.guest.secretItem : room.host.secretItem;
            const guessMsg = { from: currentPlayer, type: 'guess', text: `🤔 تخمين: ${g}` };
            const newMessages = [...(room.messages || []), guessMsg];
            if (g === opponentSecret) {
                playWin();
                database.ref('rooms/' + currentRoomId).update({ messages: newMessages, phase: 'finished', winner: currentPlayer, waitingForAnswer: false });
            } else {
                playLose();
                const guessInput = document.getElementById('guessInput');
                if (guessInput) { guessInput.classList.add('shake'); setTimeout(() => guessInput.classList.remove('shake'), 500); }
                database.ref('rooms/' + currentRoomId).update({ messages: newMessages, turn: currentPlayer === 'host' ? 'guest' : 'host', waitingForAnswer: false });
            }
        });
        document.getElementById('guessInput').value = '';
    }

        const mustAnswer = (room.waitingForAnswer === true);
        const isAnsweringTurn = (myTurn && mustAnswer);
        const isAskingTurn = (myTurn && !mustAnswer);

    // 保持事件监听器，但通过 highlightEnabled 变量控制行为
    // 这样可以保留选中状态的显示
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    // 不隐藏 selectedBox 和 selectedLabel，保留选中状态
  }

  // 完全禁用高亮功能（移除所有监听器）
  function fullyDisableHighlight() {
    console.log("Fully disabling highlight");
    highlightEnabled = false;
    document.removeEventListener("mouseover", handleMouseOver, true);
    document.removeEventListener("mouseout", handleMouseOut, true);
    document.removeEventListener("click", handleClick, true);
    overlay.style.display = "none";
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    selectedBox.style.display = "none";
    selectedLabel.style.display = "none";
  }

  // 添加事件监听
  enableHighlight();
  window.addEventListener("message", handleParentMessage);

  // 暴露全局函数供外部调用
  window.__iframeHighlightControl = {
    enable: enableHighlight,
    disable: disableHighlight,
    fullyDisable: fullyDisableHighlight,
    isEnabled: function isEnabled() {
      return highlightEnabled;
    },
    getSelectedElement: function getSelectedElement() {
      return selectedElement;
    },
    updateSelected: updateSelectedHighlight,
    // 通过消息发送开关控制
    sendToggleMessage: function sendToggleMessage(enabled) {
      window.parent.postMessage({
        type: 'iframe-highlight-status',
        enabled: enabled || highlightEnabled,
        source: 'iframe-highlight-injector'
      }, '*');
    }
  };

  // 通知父窗口脚本已加载
  try {
    window.parent.postMessage({
      type: "iframe-highlight-ready",
      data: {
        url: window.location.href,
        userAgent: navigator.userAgent,
        timestamp: Date.now()
      },
      source: "iframe-highlight-injector"
    }, "*");
  } catch (error) {
    console.warn("无法发送就绪消息到父窗口:", error);
  }

  // 清理函数
  window.__iframeHighlightCleanup = function () {
    fullyDisableHighlight();
    window.removeEventListener("message", handleParentMessage);
    if (overlay.parentElement) {
      overlay.parentElement.removeChild(overlay);
    }
    delete window.__iframeHighlightInitialized;
    delete window.__iframeHighlightCleanup;
  };
})();

</script>
</body>
</html>
